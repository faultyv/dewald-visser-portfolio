<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-labelledby="title desc">
  <title id="title">Dewald Visser portfolio preview</title>
  <desc id="desc">Founder, growth marketer, designer and systems builder across brand, web systems and AI enablement.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#11152A"/>
      <stop offset="0.48" stop-color="#172045"/>
      <stop offset="1" stop-color="#101427"/>
    </linearGradient>
    <linearGradient id="mark" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0073EA"/>
      <stop offset="0.52" stop-color="#6C6CFF"/>
      <stop offset="1" stop-color="#FF158A"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="24" stdDeviation="24" flood-color="#000000" flood-opacity="0.28"/>
    </filter>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <circle cx="1010" cy="74" r="230" fill="#6C6CFF" opacity="0.18"/>
  <circle cx="96" cy="548" r="260" fill="#0073EA" opacity="0.16"/>
  <rect x="72" y="62" width="1056" height="506" rx="44" fill="#F2F4FB" opacity="0.055" stroke="#FFFFFF" stroke-opacity="0.16"/>
  <g filter="url(#shadow)">
    <rect x="88" y="80" width="86" height="86" rx="24" fill="url(#mark)"/>
    <text x="131" y="135" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="33" font-weight="800" fill="#FFFFFF">DV</text>
  </g>
  <text x="198" y="118" font-family="Inter, Arial, sans-serif" font-size="29" font-weight="700" fill="#F2F4FB">Dewald Visser</text>
  <text x="198" y="152" font-family="Inter, Arial, sans-serif" font-size="19" font-weight="600" fill="#A6ABC9">Hillcrest · Durban · South Africa</text>
  <text x="88" y="314" font-family="Inter, Arial, sans-serif" font-size="104" font-weight="800" fill="#F2F4FB">Dewald Visser<tspan fill="#0073EA">.</tspan></text>
  <text x="94" y="378" font-family="Inter, Arial, sans-serif" font-size="34" font-weight="500" fill="#C7CBE4">Strategy, design and code under one roof.</text>
  <text x="94" y="424" font-family="Inter, Arial, sans-serif" font-size="28" font-weight="500" fill="#A6ABC9">Brand, growth marketing, web systems and practical AI.</text>
  <g font-family="Inter, Arial, sans-serif" font-size="24" font-weight="700" fill="#FFFFFF">
    <rect x="92" y="492" width="168" height="54" rx="27" fill="#6C6CFF"/>
    <text x="176" y="527" text-anchor="middle">Founder</text>
    <rect x="274" y="492" width="160" height="54" rx="27" fill="#0073EA"/>
    <text x="354" y="527" text-anchor="middle">Marketing</text>
    <rect x="448" y="492" width="132" height="54" rx="27" fill="#E2445C"/>
    <text x="514" y="527" text-anchor="middle">Design</text>
    <rect x="594" y="492" width="182" height="54" rx="27" fill="#00A962"/>
    <text x="685" y="527" text-anchor="middle">Web Systems</text>
    <rect x="790" y="492" width="210" height="54" rx="27" fill="#FF158A"/>
    <text x="895" y="527" text-anchor="middle">AI Enablement</text>
  </g>
</svg>
